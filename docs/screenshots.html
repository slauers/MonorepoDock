<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonoDock Screenshots</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        background: #0b1220;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 34px 20px 50px;
      }
      h1 {
        margin: 0;
        font-size: 32px;
      }
      p {
        color: #c2d1e8;
        line-height: 1.55;
      }
      .top-actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 36px;
        padding: 0 14px;
        border: 1px solid #3057a1;
        border-radius: 8px;
        background: #173f88;
        color: #dce9ff;
        text-decoration: none;
      }
      .btn:hover {
        text-decoration: none;
        background: #1e4a9e;
      }
      .grid {
        margin-top: 22px;
        display: grid;
        gap: 16px;
      }
      .shot {
        border: 1px solid #1e2d48;
        background: #111b30;
        border-radius: 10px;
        padding: 12px;
      }
      .shot h2 {
        margin: 0 0 10px;
        font-size: 16px;
        color: #d3e4ff;
      }
      .shot img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 8px;
      }
      .muted {
        margin-top: 20px;
        color: #93a8c5;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>MonoDock Screenshots</h1>
      <p>Current visual references for branding and UI showcase on GitHub Pages.</p>
      <div class="top-actions">
        <a class="btn" href="./index.html">Back to Home</a>
        <a class="btn" href="https://github.com/slauers/monodock" target="_blank" rel="noreferrer">Open Repository</a>
      </div>

      <section class="grid">
        <article class="shot">
          <h2>App Icon</h2>
          <img src="./assets/monodock-icon.png" alt="MonoDock icon preview" />
        </article>
        <article class="shot">
          <h2>Preview Shot</h2>
          <img src="./assets/monodock-print-1.png" alt="MonoDock preview screenshot" />
        </article>
      </section>

      <p class="muted">by slauers</p>
    </main>
  </body>
</html>
