<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonoDock</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        background: #0b1220;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 36px;
      }
      p {
        line-height: 1.6;
        color: #cbd5e1;
      }
      .card {
        margin-top: 24px;
        border: 1px solid #1e293b;
        background: #111827;
        border-radius: 8px;
        padding: 20px;
      }
      a {
        color: #60a5fa;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .muted {
        margin-top: 22px;
        color: #94a3b8;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>MonoDock</h1>
      <p>
        Visual runtime and observability desktop app for monorepos. MonoDock helps you detect projects, run targets,
        manage processes, and inspect logs with a Docker Desktop style workflow.
      </p>
      <section class="card">
        <h2>Repository</h2>
        <p>
          Source code and releases:
          <a href="https://github.com/slauers/MonorepoDock" target="_blank" rel="noreferrer">github.com/slauers/MonorepoDock</a>
        </p>
      </section>
      <p class="muted">by slauers</p>
    </main>
  </body>
</html>
